<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow EMS | Online Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary: #6366f1; --bg: #0b1121; --surface: #111827; --border: rgba(255, 255, 255, 0.05); --text: #e2e8f0; --text-muted: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; margin: 0; overflow-x: hidden; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); position: fixed; height: 100vh; padding: 2rem 1rem; display: flex; flex-direction: column; }
        .brand-text { font-weight: 700; font-size: 1.25rem; color: white; text-decoration: none; display: flex; align-items: center; gap: 0.75rem; margin-bottom: 3rem; }
        .brand-badge { background: var(--primary); font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 99px; }
        .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        .nav-item { color: var(--text-muted); text-decoration: none; padding: 0.85rem 1.25rem; border-radius: 1rem; transition: all 0.2s; display: flex; align-items: center; gap: 0.75rem; }
        .nav-item:hover, .nav-item.active { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        .main-content { flex: 1; margin-left: 280px; padding: 3rem; }
        .panel { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 2rem; }
        .metric-card .label { color: var(--text-muted); font-size: 0.875rem; }
        .metric-card .value { font-size: 2.5rem; font-weight: 700; color: white; margin-top: 0.5rem; }
        .custom-table { width: 100%; border-collapse: collapse; }
        .custom-table th { border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 1rem; }
        .custom-table td { border-bottom: 1px solid var(--border); padding: 1.2rem 1rem; }
        .badge { padding: 0.4em 0.8em; border-radius: 0.5rem; font-size: 0.75rem; }
        .bg-available { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .bg-inuse { background: rgba(56, 189, 248, 0.1); color: #38bdf8; }
        .bg-maint { background: rgba(115, 115, 115, 0.1); color: #a3a3a3; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><a class="brand-text" href="index.html"><i class="bi bi-box-seam-fill text-primary"></i> AssetFlow <span class="brand-badge">DEMO</span></a></div>
            <nav class="nav-menu">
                <a class="nav-item active" href="#" onclick="showView('equipments', this)"><i class="bi bi-columns-gap"></i><span>控制台</span></a>
                <a class="nav-item" href="#" onclick="showView('records', this)"><i class="bi bi-clock-history"></i><span>借用紀錄</span></a>
            </nav>
        </aside>
        <main class="main-content">
            <div id="view-equipments" class="view-item">
                <div class="row g-4 mb-4">
                    <div class="col-md-4"><div class="panel metric-card"><span class="label">設備總數</span><div class="value" id="s-total">0</div></div></div>
                    <div class="col-md-4"><div class="panel metric-card"><span class="label">使用中</span><div class="value text-info" id="s-use">0</div></div></div>
                    <div class="col-md-4"><div class="panel metric-card"><span class="label">維修中</span><div class="value text-muted" id="s-maint">0</div></div></div>
                </div>
                <div class="panel"><h3 class="h5 fw-bold mb-4">設備清單</h3><table class="custom-table"><thead><tr><th>名稱</th><th>類別</th><th>狀態</th><th class="text-end">操作</th></tr></thead><tbody id="eq-list"></tbody></table></div>
            </div>
            <div id="view-records" class="view-item d-none"><div class="panel"><h3 class="h5 fw-bold mb-4">最近借用動態</h3><table class="custom-table"><thead><tr><th>設備</th><th>人員</th><th>時間</th><th>狀態</th></tr></thead><tbody id="rec-list"></tbody></table></div></div>
        </main>
    </div>
    <script>
        const MOCK = [{id:1,name:"Canon EOS R10",cat:"Camera",stat:"Available"},{id:2,name:"Dell Latitude",cat:"Laptop",stat:"In Use"},{id:3,name:"Fluke 87V",cat:"Tool",stat:"Maintenance"}];
        let eqs = JSON.parse(localStorage.getItem('ems_gh_eq')) || MOCK;
        let recs = JSON.parse(localStorage.getItem('ems_gh_rec')) || [{name:"Dell Latitude",user:"Admin",time:"2026-03-31 09:00",st:"Borrowed"}];
        const save = () => { localStorage.setItem('ems_gh_eq', JSON.stringify(eqs)); localStorage.setItem('ems_gh_rec', JSON.stringify(recs)); render(); };
        const render = () => {
            const list = document.getElementById('eq-list'); list.innerHTML = "";
            eqs.forEach(e => {
                const tr = document.createElement('tr');
                const badge = e.stat==='Available'?'bg-available':(e.stat==='In Use'?'bg-inuse':'bg-maint');
                tr.innerHTML = `<td class="fw-bold">${e.name}</td><td>${e.cat}</td><td><span class="badge ${badge}">${e.stat}</span></td>
                <td class="text-end">
                    ${e.stat==='Available'?`<button class="btn btn-sm btn-outline-primary" onclick="borrowItem(${e.id})">借用</button>`:''}
                    ${e.stat==='In Use'?`<button class="btn btn-sm btn-outline-info" onclick="returnItem(${e.id})">歸還</button>`:''}
                </td>`;
                list.appendChild(tr);
            });
            const rl = document.getElementById('rec-list'); rl.innerHTML = "";
            recs.forEach(r => { const tr = document.createElement('tr'); tr.innerHTML = `<td>${r.name}</td><td>${r.user}</td><td class="text-muted small">${r.time}</td><td>${r.st}</td>`; rl.appendChild(tr); });
            document.getElementById('s-total').innerText = eqs.length;
            document.getElementById('s-use').innerText = eqs.filter(e => e.stat==='In Use').length;
            document.getElementById('s-maint').innerText = eqs.filter(e => e.stat==='Maintenance').length;
        };
        window.borrowItem = (id) => { const e = eqs.find(x=>x.id===id); e.stat = 'In Use'; recs.unshift({name:e.name,user:"User",time:new Date().toLocaleString(),st:"Borrowed"}); save(); };
        window.returnItem = (id) => { const e = eqs.find(x=>x.id===id); e.stat = 'Available'; recs.unshift({name:e.name,user:"User",time:new Date().toLocaleString(),st:"Returned"}); save(); };
        window.showView = (v, el) => { document.querySelectorAll('.view-item').forEach(x=>x.classList.add('d-none')); document.getElementById(`view-${v}`).classList.remove('d-none'); document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active')); el.classList.add('active'); };
        render();
    </script>
</body>
</html>
