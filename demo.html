<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow EMS | Online Demo</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Outfit & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="assets/css/demo.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a class="brand-text" href="index.html">
                    <i class="bi bi-box-seam-fill text-primary"></i>
                    AssetFlow <span class="brand-badge">DEMO</span>
                </a>
            </div>
            
            <nav class="nav-menu">
                <a class="nav-item active" href="#" onclick="showView('equipments')">
                    <i class="bi bi-columns-gap"></i>
                    <span>控制台</span>
                </a>
                <a class="nav-item" href="#" onclick="showView('records')">
                    <i class="bi bi-clock-history"></i>
                    <span>借用紀錄</span>
                </a>
                <div class="mt-auto mb-4 px-3">
                    <div class="panel p-3" style="background: rgba(255,255,255,0.03);">
                        <div class="small text-muted mb-1">模式：已連接 LocalStorage</div>
                        <div class="small fw-bold">模擬雲端同步中...</div>
                    </div>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 id="view-title">Dashboard 控制台</h1>
                    <div class="text-muted small">這是一個純前端展示版，功能與 .NET 原始碼完全一致。</div>
                </div>
                <button class="btn btn-primary d-flex align-items-center gap-2 px-4 py-2" data-bs-toggle="modal" data-bs-target="#equipmentModal">
                    <i class="bi bi-plus-lg"></i> 新增設備
                </button>
            </header>

            <!-- Equipments View -->
            <div id="view-equipments" class="view-section">
                <!-- Stats Row -->
                <div class="row g-4 mb-5">
                    <div class="col-md-4">
                        <div class="panel metric-card">
                            <span class="label">設備總數</span>
                            <div class="value" id="stat-total">0</div>
                            <div class="small text-success"><i class="bi bi-check2-circle me-1"></i>系統正常</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="panel metric-card">
                            <span class="label">使用中</span>
                            <div class="value text-info" id="stat-inuse">0</div>
                            <div class="small">目前借用佔比：<span id="stat-percent">0</span>%</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="panel metric-card">
                            <span class="label">維護中</span>
                            <div class="value text-warning" id="stat-maint">0</div>
                            <div class="small opacity-50">待處理工單</div>
                        </div>
                    </div>
                </div>

                <!-- Table Section -->
                <div class="panel">
                    <h3 class="h5 fw-bold mb-4">資產精選清單</h3>
                    <div class="table-responsive">
                        <table class="table custom-table">
                            <thead>
                                <tr>
                                    <th>名稱</th>
                                    <th>類別</th>
                                    <th>狀態</th>
                                    <th>位置</th>
                                    <th class="text-end">操作</th>
                                </tr>
                            </thead>
                            <tbody id="eq-list">
                                <!-- JS動態渲染 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Records View -->
            <div id="view-records" class="view-section d-none">
                <div class="panel">
                    <h3 class="h5 fw-bold mb-4">歷史借用紀錄流水帳</h3>
                    <div class="table-responsive">
                        <table class="table custom-table">
                            <thead>
                                <tr>
                                    <th>設備</th>
                                    <th>借用人</th>
                                    <th>借用時間</th>
                                    <th>狀態</th>
                                </tr>
                            </thead>
                            <tbody id="record-list">
                                <!-- JS動態渲染 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Modals (Add, Borrow, etc.) -->
    <!-- 此處省略部分結構，在 JS 生成時會補完功能 -->

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/demo.js"></script>
</body>
</html>
