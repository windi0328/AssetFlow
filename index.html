<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow EMS | 官網展示版 (Online Demo)</title>
    <!-- 使用相同的設計語彙 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0b1121;
            --surface: #111827;
            --text: #e2e8f0;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }
        .hero-card {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4rem 2rem;
            border-radius: 2rem;
            max-width: 800px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .btn-launch {
            background: var(--primary);
            color: white;
            padding: 1rem 2.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            border-radius: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s;
            margin-top: 2rem;
        }
        .btn-launch:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
            color: white;
        }
        .source-link {
            color: #94a3b8;
            text-decoration: none;
            margin-top: 1.5rem;
            display: block;
            font-size: 0.9rem;
        }
        .source-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="hero-card">
        <div class="mb-4">
            <i class="bi bi-box-seam-fill text-primary" style="font-size: 4rem;"></i>
        </div>
        <h1 class="display-4 fw-bold mb-3">AssetFlow EMS</h1>
        <p class="lead text-secondary mb-4">
            專業的資產管理系統。包含設備追蹤、借用歸還流程與即時數據分析。<br>
            <span class="badge bg-primary mt-2">v1.0.4 Online Demo</span>
        </p>
        
        <a href="demo.html" class="btn-launch">
            立即啟動系統展示 <i class="bi bi-rocket-takeoff"></i>
        </a>
        
        <p class="text-muted small mt-5">
            注意：展示版使用 LocalStorage 進行資料存檔。<br>
            若要下載完整 .NET 8 原始碼，請前往您的 GitHub Repository 下載。
        </p>
    </div>

</body>
</html>
